name: Release

on:
  push:
    branches: [develop]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - '.github/dependabot.yml'
  workflow_dispatch:
    inputs:
      fast:
        description: "Skip aarch64 to halve runtime (use for dev iteration; tag pushes always go multi-arch)."
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: homeCore-io/hc-scripts/.github/workflows/rust-release.yml@main
    with:
      binary_name: hc-yolink
      config_example: config/config.toml.example
      rust_version: "stable"
      publish_docker_image: true
      docker_repo_ref: develop  # remove once homeCore-io/docker is on main
      fast: ${{ inputs.fast || false }}
